# Cloudflare Workers configuration for Move & Meet.
# The site is deployed as a Worker built by @opennextjs/cloudflare.
# See ADR-0003 for context.

name = "move-and-meet"
main = ".open-next/worker.js"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# Static assets bundle generated by the OpenNext build.
# Cloudflare serves these directly from the edge; the Worker is only invoked
# for dynamic routes.
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Wrangler runs this command before any deploy / versions upload.
# It produces the .open-next/ output the [assets] and `main` settings above
# point at. Keeping it here (rather than only in package.json) means the
# Cloudflare Workers Builds pipeline gets the OpenNext step automatically,
# regardless of what the dashboard's Build/Deploy command fields contain.
[build]
command = "pnpm exec opennextjs-cloudflare build"

# Production environment variables are managed in the Cloudflare dashboard.
# Local development uses .env.local (git-ignored).
[vars]
# NEXT_PUBLIC_SITE_URL is supplied per environment.
