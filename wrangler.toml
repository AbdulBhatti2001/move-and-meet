# Cloudflare Workers configuration for Move & Meet.
# The site is deployed as a Worker built by @opennextjs/cloudflare.
# See ADR-0003 for context.

name = "move-and-meet"
main = ".open-next/worker.js"
compatibility_date = "2025-09-23"
compatibility_flags = ["nodejs_compat"]

# Static assets bundle generated by the OpenNext build.
# Cloudflare serves these directly from the edge; the Worker is only invoked
# for dynamic routes.
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Wrangler runs this command before any deploy / versions upload.
# It produces the .open-next/ output the [assets] and `main` settings above
# point at. Keeping it here (rather than only in package.json) means the
# Cloudflare Workers Builds pipeline gets the OpenNext step automatically,
# regardless of what the dashboard's Build/Deploy command fields contain.
[build]
command = "pnpm exec opennextjs-cloudflare build"

# Production environment variables.
# NEXT_PRIVATE_MINIMAL_MODE: workaround for opennextjs-cloudflare#1232 /
# #922 — without it, Next.js's getMiddlewareManifest() emits an
# unstaticable dynamic require of /.next/server/middleware-manifest.json
# which crashes the V8 isolate at request time ("Internal Server Error").
# Setting NEXT_PRIVATE_MINIMAL_MODE=1 takes the early-return branch in
# next-server.js and skips the require. The next-intl middleware still
# runs because OpenNext bundles it into a separate middleware function.
[vars]
NEXT_PRIVATE_MINIMAL_MODE = "1"
NEXT_PUBLIC_SITE_URL = "https://move-and-meet.bhattiabdul01.workers.dev"
